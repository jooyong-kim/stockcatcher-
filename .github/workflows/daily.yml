name: 스톡캐쳐 일일 데이터 수집

on:
  schedule:
    # 평일 KST 19:00 (UTC 10:00) — 장 마감 후 확정 데이터 기준
    - cron: '0 10 * * 1-5'
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install pykrx pandas numpy

      - name: 수집 및 지표 계산
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: python pipeline/collect_krx.py

      - name: 결과 커밋
        run: |
          git config user.name "stockcatcher-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/screener.json
          git diff --cached --quiet && echo "변경 없음(휴장일 가능성)" || git commit -m "data: $(date +'%Y-%m-%d') 스크리너 데이터 갱신"
          git push
